kind          = "linter"
name          = "clang-tidy"
family        = "llvm"
binary        = "clang-tidy"
version_arg   = "--version"
version_regex = 'LLVM version (\d+\.\d+\.\d+)'
extensions    = [".cpp", ".cc", ".cxx", ".c++", ".cppm", ".c"]

[run]
check = ""
fix   = "--fix --fix-errors"

[settings]
checks = "--checks={value}"
config = "--config-file={value}"
