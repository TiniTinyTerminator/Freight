kind          = "formatter"
name          = "clang-format"
family        = "llvm"
extensions    = [".cpp", ".cc", ".cxx", ".c++", ".cppm", ".c", ".h", ".hpp", ".hxx", ".cu", ".hip"]

[version]
argument = "--version"
regex    = 'clang-format version (\d+\.\d+\.\d+)'

[run]
fix   = "-i"
check = "--dry-run --Werror"

[settings]
style  = "--style={value}"
config = "--style=file:{value}"

[values]
style = ["Google", "LLVM", "Mozilla", "WebKit", "Chromium", "Microsoft", "GNU", "file"]
