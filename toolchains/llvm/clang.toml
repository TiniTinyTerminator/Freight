name          = "clang"
kind          = "compiler"
family        = "llvm"
homepage      = "https://clang.llvm.org/"

debug = "-g"
lto      = "-flto"
cpu_ext  = "-m{name}"

[version]
argument = "--version"
regex    = '\b(\d+\.\d+\.\d+)\b'

[sanitizer]
argument = "-fsanitize={values}"
options = ["address", "undefined", "thread", "memory", "leak", "hwaddress", "dataflow", "cfi", "safestack"]

[toolset]
cc    = "$(binary)"
cxx   = "$(binary.replace('clang', 'clang++'))"
ld    = "$(binary.replace('clang', 'clang++'))"
ar    = "ar"
strip = "strip"

[structure]
include_dir  = "-I{path}"
define       = "-D{name}"
define_value = "-D{name}={value}"
output       = "-o {path}"
compile_only = "-c"
dep_file     = "-MMD -MF {path}"
target       = "--target={triple}"
sysroot      = "--sysroot={path}"

[optimization]
"0" = "-O0"
"1" = "-O1"
"2" = "-O2"
"3" = "-O3"
"s" = "-Os"
"z" = "-Oz"

[warnings]
normal = "-Wall"
none   = ""
all    = "-Wall -Wextra -Wpedantic"
error  = "-Wall -Wextra -Wpedantic -Werror"

[language.std]
"c11" = "-std=c11"
"c17" = "-std=c17"
"c23" = "-std=c23"

[language.modules]
style = "none"

[linking.c]
abi            = "c"
compatible     = ["fortran", "asm"]
compile_binary = "$(binary)"
linker         = ""
extensions     = [".c", ".s", ".S"]

[linking.objc]
abi            = "objc"
compatible     = ["c"]
compile_binary = "$(binary)"
linker         = ""
extensions     = [".m"]
