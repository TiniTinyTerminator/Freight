name          = "clang++"
alias         = "clang"
kind          = "compiler"
family        = "llvm"
homepage      = "https://clang.llvm.org/"

detect       = ["clang++"]
always_flags = []

dbg      = "-g"
lto      = "-flto"
sanitize = "-fsanitize={values}"
cpu_ext  = "-m{name}"

[header]
version_arg   = "--version"
version_regex = '\b(\d+\.\d+\.\d+)\b'
passthrough        = false
passthrough_prefix = ""
sanitizer_options  = ["address", "undefined", "thread", "memory", "leak", "hwaddress", "dataflow", "cfi", "safestack"]

[toolset]
cc    = "$(binary.replace('clang++', 'clang'))"
cxx   = "$(binary)"
ld    = "$(binary)"
ar    = "ar"
strip = "strip"

[structure]
include_dir  = "-I{path}"
define       = "-D{name}"
define_value = "-D{name}={value}"
output       = "-o {path}"
compile_only = "-c"
dep_file     = "-MMD -MF {path}"
target       = "--target={triple}"
sysroot      = "--sysroot={path}"

[optimization]
"0" = "-O0"
"1" = "-O1"
"2" = "-O2"
"3" = "-O3"
"s" = "-Os"
"z" = "-Oz"

[warnings]
normal = "-Wall"
none   = ""
all    = "-Wall -Wextra -Wpedantic"
error  = "-Wall -Wextra -Wpedantic -Werror"

[stdlib]
"libc++"    = "-stdlib=libc++"
"libstdc++" = "-stdlib=libstdc++"
none        = "-nostdlib"

extensions = [".cpp", ".cppm", ".ixx", ".mpp", ".cc", ".cxx", ".c++", ".mm"]

[language.std]
"c++17" = "-std=c++17"
"c++20" = "-std=c++20"
"c++23" = "-std=c++23"
"c++26" = "-std=c++26"

[modules]
style         = "clang"
precompile    = "--precompile"
import_module = "-fmodule-file={name}={pcm_path}"
header_unit   = "-x c++-header"

[pch]
compile     = "-x c++-header"
use         = "-include-pch {pch_path}"
extension   = ".pch"
clangd_flag = "-include {header_path}"

[compiler.lto_mode]
thin = "-flto=thin"
full = "-flto=full"

[linking.cpp]
abi        = "c++"
compatible = ["c", "fortran"]
linker     = ""
extensions = [".cpp", ".cppm", ".ixx", ".mpp", ".cc", ".cxx", ".c++"]

[linking.objcpp]
abi        = "c++"
compatible = ["c", "objc"]
linker     = ""
extensions = [".mm"]
