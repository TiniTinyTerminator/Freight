name          = "flang"
kind          = "compiler"
family        = "llvm"
homepage      = "https://flang.llvm.org/"

supported_os    = ["linux", "macos", "windows"]

debug    = "-g"
lto      = "-flto=thin"
lto_link = "-flto=thin"
cpu_ext  = "-m{name}"

[version]
argument = "--version"
regex    = 'flang(?:-new)? version (\d+\.\d+\.\d+)'

[sanitizer]
argument = "-fsanitize={values}"
options = ["address", "undefined"]

[arch_flags]
x86_64      = "-m64"
x86         = "-m32"

[toolset]
ld     = "$(binary)"
ar     = "ar"
ranlib = "ranlib"
strip  = "strip"
nm     = "nm"

[structure]
include_dir  = "-I{path}"
define       = "-D{name}"
define_value = "-D{name}={value}"
output       = "-o {path}"
compile_only = "-c"
dep_file     = "-MMD -MF {path}"
system_lib   = "-l{name}"
target       = "--target={triple}"
sysroot      = "--sysroot={path}"

[optimization]
"0"    = "-O0"
"1"    = "-O1"
"2"    = "-O2"
"3"    = "-O3"
"s"    = "-O2"
"z"    = "-O2"
"fast" = "-O3 -ffast-math"

[warnings]
normal = "-Wall"
none   = ""
all    = "-Wall -Wextra"
error  = "-Wall -Wextra -Werror"

[language.std]
"f2003" = "-std=f2003"
"f2008" = "-std=f2008"
"f2018" = "-std=f2018"
"f95"   = "-std=f95"

[language.implicit_none]
enabled  = "-fimplicit-none"
disabled = ""

[language.openmp]
enabled  = "-fopenmp"
disabled = ""

[compiler.debug_info]
dwarf4 = "-gdwarf-4"
dwarf5 = "-gdwarf-5"
"1"    = "-g1"
"2"    = "-g2"
"3"    = "-g3"

[compiler.lto_mode]
thin = "-flto=thin"
full = "-flto=full"

[linking.fortran]
abi        = "fortran"
compatible = ["c"]
linker     = ""
extensions = [".f90", ".f95", ".f03", ".f08", ".f", ".F90"]
