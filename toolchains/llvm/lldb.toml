kind          = "debugger"
name          = "lldb"
binary        = "lldb"

[version]
argument = "--version"
regex    = '\b(\d+\.\d+\.\d+)\b'

[launch]
separator = "--"

[dap]
binaries    = ["lldb-dap", "lldb-vscode"]
vscode_type = "lldb"
mi_mode     = "lldb"

[settings]
no_use_colors = "--no-use-colors"
batch         = "--batch"
