name          = "nvc++"
kind          = "compiler"
family        = "nvidia"
homepage      = "https://developer.nvidia.com/hpc-sdk"
supported_archs    = ["x86_64", "aarch64"]
supported_os       = ["linux"]

detect       = ["nvc++"]
always_flags = []

debug = "-g"
lto     = ""
cpu_ext = "-m{name}"

extensions = [".cpp", ".cc", ".cxx", ".c++"]

[version]
argument = "--version"
regex    = '(\d+\.\d+)'

[sanitizer]
options = ["address"]

[toolset]
cc    = "nvc"
cxx   = "nvc++"
ld    = "nvc++"
ar    = "ar"

[structure]
include_dir  = "-I{path}"
define       = "-D{name}"
define_value = "-D{name}={value}"
output       = "-o {path}"
compile_only = "-c"
dep_file     = "-MMD -MF {path}"
target       = ""
sysroot      = ""

[optimization]
"0" = "-O0"
"1" = "-O1"
"2" = "-O2"
"3" = "-O3"
"s" = "-O2"
"z" = "-O2"

[warnings]
normal = ""
none   = ""
all    = "-Minform=warn"
error  = "-Minform=warn -Werror"

[language.std]
"c++17" = "-std=c++17"
"c++20" = "-std=c++20"

[language.modules]
style = "none"

[linking.cpp]
abi        = "c++"
compatible = ["c", "fortran"]
linker     = ""
extensions = [".cpp", ".cc", ".cxx", ".c++"]
