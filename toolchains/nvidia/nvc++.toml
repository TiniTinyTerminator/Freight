name          = "nvc++"
kind          = "compiler"
family        = "nvidia"
homepage      = "https://developer.nvidia.com/hpc-sdk"
supported_archs    = ["x86_64", "aarch64"]
supported_os       = ["linux"]

debug   = "-g"
lto     = "-Mipa"
lto_link = "-Mipa"
cpu_ext = "-m{name}"

extensions = [".cpp", ".cc", ".cxx", ".c++"]

[version]
argument = "--version"
regex    = '(\d+\.\d+)'

[sanitizer]
options = ["address"]

[toolset]
cc     = "nvc"
cxx    = "nvc++"
ld     = "nvc++"
ar     = "ar"
ranlib = "ranlib"
strip  = "strip"
nm     = "nm"

[structure]
include_dir  = "-I{path}"
define       = "-D{name}"
define_value = "-D{name}={value}"
output       = "-o {path}"
compile_only = "-c"
dep_file     = "-MMD -MF {path}"
system_lib   = "-l{name}"
target       = ""
sysroot      = ""

[optimization]
"0"    = "-O0"
"1"    = "-O1"
"2"    = "-O2"
"3"    = "-O3"
"s"    = "-O2"
"z"    = "-O2"
"fast" = "-O4 -Mfprelaxed"

[warnings]
normal = ""
none   = ""
all    = "-Minform=warn"
error  = "-Minform=warn -Werror"

[language.std]
"c++17" = "-std=c++17"
"c++20" = "-std=c++20"
"c++14" = "-std=c++14"
"c++23" = "-std=c++23"

[language.openmp]
enabled  = "-mp"
disabled = ""

[compiler.acc]
enabled  = "-acc"
disabled = ""

[compiler.gpu_arch]
value = "-gpu=$(value)"

[compiler.target_arch]
value = "-tp=$(value)"

[linking.cpp]
abi        = "c++"
compatible = ["c", "fortran"]
linker     = ""
extensions = [".cpp", ".cc", ".cxx", ".c++"]
