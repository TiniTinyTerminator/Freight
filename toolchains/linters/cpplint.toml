kind          = "linter"
name          = "cpplint"
family        = "cpplint"
binary        = "cpplint"
extensions    = [".cpp", ".cc", ".cxx", ".c++", ".c", ".h", ".hpp", ".hxx"]

[header]
version_arg   = "--version"
version_regex = 'cpplint (\d+\.\d+\.\d+)'

[run]
check = ""
fix   = ""

[settings]
filter     = "--filter={value}"
linelength = "--linelength={value}"
root       = "--root={value}"
