kind          = "formatter"
name          = "uncrustify"
family        = "uncrustify"
binary        = "uncrustify"
extensions    = [".cpp", ".cc", ".cxx", ".c++", ".c", ".h", ".hpp", ".hxx", ".cs", ".java"]

[version]
argument = "--version"
regex    = 'Uncrustify-(\d+\.\d+\.\d+)'

[run]
fix   = "--no-backup --replace"
check = "--check"

[settings]
config = "-c {value}"
