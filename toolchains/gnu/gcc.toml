base       = ["_gnu-base", "../languages/_c"]
name       = "gcc"
homepage   = "https://gcc.gnu.org/"
detect     = ["gcc", "gcc-14", "gcc-13", "gcc-12", "gcc-11", "gcc-10"]
extensions = [".c", ".s", ".S"]

[toolset]
cc  = "$(binary)"
cxx = "$(binary.replace('gcc', 'g++'))"
ld  = "$(binary.replace('gcc', 'g++'))"

[linking.c]
abi             = "c"
compatible      = ["fortran", "asm"]
compile_binary  = "$(binary)"
linker          = ""
extensions      = [".c", ".s", ".S"]
