base     = ["_gnu-base", "../languages/_cpp"]
name     = "aarch64-linux-gnu"
family   = "gnu"
homepage = "https://gcc.gnu.org/"
detect   = ["aarch64-linux-gnu-g++"]

# Override the -m64/-m32 flags that _gnu-base emits for x86 — the cross-compiler
# always targets aarch64 and doesn't accept architecture-override flags.
always_flags = []

[toolset]
cc    = "aarch64-linux-gnu-gcc"
cxx   = "aarch64-linux-gnu-g++"
ld    = "aarch64-linux-gnu-g++"
ar    = "aarch64-linux-gnu-ar"
strip = "aarch64-linux-gnu-strip"

[modules]
style         = "gcc"
enable_flag   = "-fmodules-ts"
compile_miu   = "-fmodule-output={pcm_path}"
import_module = "-fmodule-file={name}={pcm_path}"
header_unit   = "-fmodule-header"

[pch]
compile     = "-x c++-header"
use         = "-include {header_path}"
extension   = ".gch"
clangd_flag = "-include {header_path}"
