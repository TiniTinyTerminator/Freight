name          = "aarch64-linux-gnu"
kind          = "compiler"
family        = "gnu"
homepage      = "https://gcc.gnu.org/"

debug = "-g"
lto      = "-flto"
cpu_ext  = "-m{name}"

[version]
argument = "--version"
regex    = '\b(\d+\.\d+\.\d+)\b'

[sanitizer]
argument = "-fsanitize={values}"
options = ["address", "undefined", "thread", "leak"]

[toolset]
cc    = "aarch64-linux-gnu-gcc"
cxx   = "aarch64-linux-gnu-g++"
ld    = "aarch64-linux-gnu-g++"
ar    = "aarch64-linux-gnu-ar"
strip = "aarch64-linux-gnu-strip"

[structure]
include_dir  = "-I{path}"
define       = "-D{name}"
define_value = "-D{name}={value}"
output       = "-o {path}"
compile_only = "-c"
dep_file     = "-MMD -MF {path}"
target       = ""
sysroot      = "--sysroot={path}"

[optimization]
"0" = "-O0"
"1" = "-O1"
"2" = "-O2"
"3" = "-O3"
"s" = "-Os"
"z" = "-Oz"

[warnings]
normal = "-Wall"
none   = ""
all    = "-Wall -Wextra -Wpedantic"
error  = "-Wall -Wextra -Wpedantic -Werror"

[language.std]
"c++17" = "-std=c++17"
"c++20" = "-std=c++20"
"c++23" = "-std=c++23"
"c++26" = "-std=c++26"

[language.modules]
style         = "gcc"
enable_flag   = "-fmodules-ts"
compile_miu   = "-fmodule-output={pcm_path}"
import_module = "-fmodule-file={name}={pcm_path}"
header_unit   = "-fmodule-header"

[language.pch]
compile     = "-x c++-header"
use         = "-include {header_path}"
extension   = ".gch"

[linking.cpp]
abi        = "c++"
compatible = ["c", "fortran"]
linker     = ""
extensions = [".cpp", ".cppm", ".ixx", ".mpp", ".cc", ".cxx", ".c++"]
