name          = "gdc"
kind          = "compiler"
family        = "gnu"
homepage      = "https://gcc.gnu.org/"

detect       = ["gdc"]
always_flags = ["$(arch == 'x86_64' ? '-m64' : arch == 'x86' ? '-m32' : '')"]

debug = "-g"
lto      = "-flto"
sanitize = "-fsanitize={values}"
cpu_ext  = "-m{name}"

[version]
argument = "--version"
regex    = '\b(\d+\.\d+\.\d+)\b'

[passthrough]
enabled = false
prefix  = ""

[sanitizer]
options = ["address", "undefined", "thread", "leak"]

[toolset]
ld    = "gdc"
ar    = "ar"
strip = "strip"

[structure]
include_dir  = "-I{path}"
define       = "-fversion={name}"
define_value = "-fversion={name}"
output       = "-o {path}"
compile_only = "-c"
dep_file     = "-MMD -MF {path}"
target       = ""
sysroot      = "--sysroot={path}"

[optimization]
"0" = "-O0"
"1" = "-O1"
"2" = "-O2"
"3" = "-O3"
"s" = "-Os"
"z" = "-Oz"

[warnings]
normal = ""
none   = ""
all    = "-Wall"
error  = "-Wall -Werror"

[language.modules]
style = "none"

[linking.d]
abi        = "d"
compatible = ["c"]
linker     = ""
extensions = [".d"]
