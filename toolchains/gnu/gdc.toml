name          = "gdc"
kind          = "compiler"
family        = "gnu"
homepage      = "https://gcc.gnu.org/"

debug = "-g"
lto      = "-flto"
cpu_ext  = "-m{name}"

[version]
argument = "--version"
regex    = '\b(\d+\.\d+\.\d+)\b'

[sanitizer]
argument = "-fsanitize={values}"
options = ["address", "undefined", "thread", "leak"]

[arch_flags]
x86_64 = "-m64"
x86    = "-m32"

[toolset]
ld    = "gdc"
ar    = "ar"
strip = "strip"

[structure]
include_dir  = "-I{path}"
define       = "-fversion={name}"
define_value = "-fversion={name}"
output       = "-o {path}"
compile_only = "-c"
dep_file     = "-MMD -MF {path}"
target       = ""
sysroot      = "--sysroot={path}"

[optimization]
"0" = "-O0"
"1" = "-O1"
"2" = "-O2"
"3" = "-O3"
"s" = "-Os"
"z" = "-Oz"

[warnings]
normal = ""
none   = ""
all    = "-Wall"
error  = "-Wall -Werror"
[linking.d]
abi        = "d"
compatible = ["c"]
linker     = ""
extensions = [".d"]
