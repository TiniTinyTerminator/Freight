name          = "hipcc"
kind          = "compiler"
family        = ""
homepage      = "https://rocm.docs.amd.com/"
binary        = "hipcc"
extensions    = [".hip"]
supported_archs    = ["x86_64"]
supported_os       = ["linux"]
required_tools     = ["hipconfig"]
requires_toolchain = ["cpp"]
lto = "-flto"

[header]
version_arg   = "--version"
version_regex = 'HIP version: (\d+\.\d+\.\d+)'
passthrough        = false
passthrough_prefix = ""
sanitizer_options = ["address", "undefined"]

[toolset]
ld = "hipcc"

[optimization]
"2" = "-O2"
"0" = "-O0"
"1" = "-O1"
"3" = "-O3"
"s" = "-Os"
"z" = "-Oz"

dbg = "-g -ggdb"

[warnings]
normal = "-Wall"
none   = ""
all    = "-Wall -Wextra"
error  = "-Wall -Wextra -Werror"

[structure]
include_dir  = "-I{path}"
define       = "-D{name}"
define_value = "-D{name}={value}"
output       = "-o {path}"
compile_only = "-c"
dep_file     = "-MMD -MF {path}"
target       = "--target={triple}"
sysroot      = "--sysroot={path}"

[modules]
style = "none"

[language.std]
"c++17" = "-std=c++17"
"c++14" = "-std=c++14"
"c++20" = "-std=c++20"

[linking.hip]
abi        = "hip"
compatible = ["c++", "c", "fortran"]
linker     = "c++"
extensions = [".hip"]
