name          = "hipcc"
kind          = "compiler"
family        = ""
homepage      = "https://rocm.docs.amd.com/"
extensions    = [".hip"]
supported_archs    = ["x86_64"]
supported_os       = ["linux"]
required_tools     = ["hipconfig"]
requires_toolchain = ["cpp"]
lto      = "-flto=thin"
lto_link = "-flto=thin"
design   = "clang"

[version]
argument = "--version"
regex    = 'HIP version: (\d+\.\d+\.\d+)'

[sanitizer]
argument = "-fsanitize={values}"
options = ["address", "undefined"]

[toolset]
ld = "hipcc"

[optimization]
"2"    = "-O2"
"0"    = "-O0"
"1"    = "-O1"
"3"    = "-O3"
"s"    = "-Os"
"z"    = "-Oz"
"fast" = "-Ofast"

debug = "-g -ggdb"

[warnings]
normal = "-Wall"
none   = ""
all    = "-Wall -Wextra"
error  = "-Wall -Wextra -Werror"

[structure]
include_dir  = "-I{path}"
define       = "-D{name}"
define_value = "-D{name}={value}"
output       = "-o {path}"
compile_only = "-c"
dep_file     = "-MMD -MF {path}"
system_lib   = "-l{name}"
target       = "--target={triple}"
sysroot      = "--sysroot={path}"

[language.std]
"c++17"   = "-std=c++17"
"c++20"   = "-std=c++20"
"c++23"   = "-std=c++23"
"c++14"   = "-std=c++14"

[language.exceptions]
enabled  = "-fexceptions"
disabled = "-fno-exceptions"

[language.rtti]
enabled  = "-frtti"
disabled = "-fno-rtti"

[language.visibility]
default  = "-fvisibility=default"
hidden   = "-fvisibility=hidden"

[compiler.gpu_arch]
value = "--offload-arch=$(value)"

[compiler.debug_info]
dwarf4 = "-gdwarf-4"
dwarf5 = "-gdwarf-5"
"1"    = "-g1"
"2"    = "-g2"
"3"    = "-g3"

[linking.hip]
abi        = "hip"
compatible = ["c++", "c", "fortran"]
linker     = "c++"
extensions = [".hip"]
