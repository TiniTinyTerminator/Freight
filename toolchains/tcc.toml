name          = "tcc"
kind          = "compiler"
family        = ""
homepage      = "https://bellard.org/tcc/"
extensions    = [".c"]
supported_archs = ["x86_64", "x86", "aarch64", "armv7"]
supported_os    = ["linux", "windows"]
lto = ""

[version]
argument = "-v"
regex    = 'version (\d+\.\d+\.\d+)'

[sanitizer]
options = []

[toolset]
cc = "tcc"
ld = "tcc"
ar = "tcc"

[optimization]
"0" = ""
"1" = ""
"2" = ""
"3" = ""
"s" = ""
"z" = ""

debug = "-g"

[warnings]
normal = "-Wall"
none   = ""
all    = "-Wall"
error  = "-Wall -Werror"

[structure]
include_dir  = "-I{path}"
define       = "-D{name}"
define_value = "-D{name}={value}"
output       = "-o {path}"
compile_only = "-c"
dep_file     = ""
system_lib   = "-l{name}"
target       = ""
sysroot      = ""

[language.std]
"c11" = "-std=c11"
"c99" = "-std=c99"
"c17" = "-std=c17"
"c89" = "-std=c89"

[linking.c]
abi             = "c"
compatible      = []
compile_binary  = "tcc"
linker          = ""
extensions      = [".c"]
