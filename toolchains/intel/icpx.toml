name          = "icpx"
kind          = "compiler"
family        = "intel"
homepage      = "https://www.intel.com/content/www/us/en/developer/tools/oneapi/dpc-compiler.html"
supported_archs    = ["x86", "x86_64"]
supported_os       = ["linux", "windows"]
required_env       = ["ONEAPI_ROOT"]

always_flags = ["-fsycl"]

debug    = "-g"
lto      = "-flto"
lto_link = "-flto"
cpu_ext  = "-m{name}"
design   = "clang"

extensions = [".cpp", ".cc", ".cxx", ".c++", ".sycl"]

[version]
argument = "--version"
regex    = '\b(\d+\.\d+\.\d+)\b'

[sanitizer]
argument = "-fsanitize={values}"
options = ["address", "undefined", "thread", "leak"]

[arch_flags]
x86_64 = "-m64"
x86    = "-m32"

[toolset]
ld     = "icpx"
ar     = "ar"
ranlib = "ranlib"
strip  = "strip"
nm     = "nm"

[structure]
include_dir  = "-I{path}"
define       = "-D{name}"
define_value = "-D{name}={value}"
output       = "-o {path}"
compile_only = "-c"
dep_file     = "-MMD -MF {path}"
system_lib   = "-l{name}"
target       = "--target={triple}"
sysroot      = "--sysroot={path}"

[optimization]
"0"    = "-O0"
"1"    = "-O1"
"2"    = "-O2"
"3"    = "-O3"
"s"    = "-Os"
"z"    = "-Oz"
"fast" = "-Ofast"

[warnings]
normal = "-Wall"
none   = ""
all    = "-Wall -Wextra"
error  = "-Wall -Wextra -Werror"

[compiler.debug_info]
dwarf4 = "-gdwarf-4"
dwarf5 = "-gdwarf-5"
"1"    = "-g1"
"2"    = "-g2"
"3"    = "-g3"

[language.std]
"c++17" = "-std=c++17"
"c++20" = "-std=c++20"
"c++23" = "-std=c++23"
"c++14" = "-std=c++14"

[language.exceptions]
enabled  = "-fexceptions"
disabled = "-fno-exceptions"

[language.rtti]
enabled  = "-frtti"
disabled = "-fno-rtti"

[language.visibility]
default  = "-fvisibility=default"
hidden   = "-fvisibility=hidden"

[linking.sycl]
abi        = "sycl"
compatible = ["c++", "c", "fortran"]
linker     = ""
extensions = [".sycl", ".cpp", ".cc", ".cxx"]
