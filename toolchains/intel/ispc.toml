name          = "ispc"
kind          = "compiler"
family        = "intel"
homepage      = "https://ispc.github.io/"
binary        = "ispc"
extensions    = [".ispc"]
supported_archs    = ["x86_64", "aarch64"]
requires_toolchain = ["cpp"]
lto = ""

[header]
version_arg   = "--version"
version_regex = '(\d+\.\d+\.\d+)'
passthrough        = false
passthrough_prefix = ""
sanitizer_options = []

[toolset]
ld = "ispc"

[optimization]
"2" = "-O2"
"0" = "-O0"
"1" = "-O1"
"3" = "-O3"
"s" = "-O2"
"z" = "-O2"

dbg = "-g"

[warnings]
normal = ""
none   = "--woff"
all    = ""
error  = "--werror"

[structure]
include_dir  = "-I{path}"
define       = "-D{name}"
define_value = "-D{name}={value}"
output       = "-o {path}"
compile_only = ""
dep_file     = "-MMM {path}"
target       = ""
sysroot      = ""

[modules]
style = "none"

[linking.ispc]
abi        = "ispc"
compatible = ["c++", "c"]
linker     = ""
extensions = [".ispc"]
